name: Tests

on: [push, pull_request]

jobs:
  tests:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run shared utils tests
        run: pytest -v tests/test_shared

      - name: Run app server tests
        run: pytest -v tests/test_app

      - name: Run launcher tests
        run: pytest -v tests/test_launcher

      - name: Run tools tests
        run: pytest -v tests/test_tools