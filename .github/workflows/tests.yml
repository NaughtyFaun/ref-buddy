name: Tests

on: [push, pull_request]

jobs:
  app-shared-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v tests/test_shared

  app-server-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

