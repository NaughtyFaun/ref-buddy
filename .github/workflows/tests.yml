name: Tests

on: [push, pull_request]

jobs:
  tests:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      # ffmpeg Ubuntu
      - name: Install ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # ffmpeg macOS
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      # ffmpeg Windows
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run shared utils tests
        run: pytest -v tests/test_shared

      - name: Run app server tests
        run: pytest -v tests/test_app

      - name: Run launcher tests
        run: pytest -v tests/test_launcher

      - name: Run assets import tests
        run: pytest -v tests/test_import

      - name: Run tools tests
        run: pytest -v tests/test_tools

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      # ffmpeg Ubuntu
      - name: Install ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tools tests
        run: pytest -v --cov=app --cov=launcher --cov=tools --cov=shared_utils --cov-report=xml --cov-report=term-missing tests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml